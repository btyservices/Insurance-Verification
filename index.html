<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Verification Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 1.5rem;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-area.has-file {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .upload-subtext {
            color: #666;
            font-size: 0.9rem;
        }

        .file-input {
            display: none;
        }

        .selected-file {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: #e0e7ff;
            border-radius: 6px;
            align-items: center;
            gap: 0.5rem;
        }

        .selected-file.visible {
            display: flex;
        }

        .file-name {
            flex: 1;
            font-weight: 600;
            color: #333;
        }

        .remove-file {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .remove-file:hover {
            background: #dc2626;
        }

        .metadata-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .form-group input {
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-weight: 600;
            width: 100%;
        }

        .save-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .storage-section {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .storage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .storage-header h2 {
            color: #333;
            font-size: 1.5rem;
        }

        .search-box {
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
            max-width: 400px;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .forms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .form-card {
            background: #f8f9ff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .form-card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .form-card-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .pdf-icon {
            font-size: 2.5rem;
        }

        .form-card-title {
            flex: 1;
            font-weight: 700;
            color: #333;
            font-size: 1.2rem;
            word-wrap: break-word;
        }

        .form-card-details {
            margin-bottom: 1rem;
        }

        .detail-row {
            display: flex;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
            min-width: 110px;
        }

        .detail-value {
            color: #333;
            word-wrap: break-word;
        }

        .form-card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .download-btn {
            flex: 1;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.2rem;
        }

        .success-message {
            background: #10b981;
            color: white;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .success-message.show {
            display: flex;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .metadata-form {
                grid-template-columns: 1fr;
            }

            .storage-header {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Insurance Verification Database</h1>
            <p>Upload, store, and manage your insurance verification forms</p>
        </div>

        <div class="upload-section">
            <h2 class="section-title">Upload New Verification Form</h2>
            
            <div class="success-message" id="successMessage">
                ✓ Form saved successfully!
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Click to upload or drag and drop</div>
                <div class="upload-subtext">PDF files only</div>
                <input type="file" id="fileInput" class="file-input" accept=".pdf">
            </div>

            <div class="selected-file" id="selectedFile">
                <span class="file-name" id="fileName"></span>
                <button class="remove-file" id="removeFile">Remove</button>
            </div>

            <div class="metadata-form">
                <div class="form-group">
                    <label for="insuranceName">Insurance Name *</label>
                    <input type="text" id="insuranceName" placeholder="e.g., Blue Cross Blue Shield" required>
                </div>
                <div class="form-group">
                    <label for="groupName">Group Name *</label>
                    <input type="text" id="groupName" placeholder="e.g., ABC Corporation" required>
                </div>
                <div class="form-group">
                    <label for="groupNumber">Group Number *</label>
                    <input type="text" id="groupNumber" placeholder="e.g., 123456" required>
                </div>
            </div>

            <button class="save-btn" id="saveBtn" disabled>Save Verification Form</button>
        </div>

        <div class="storage-section">
            <div class="storage-header">
                <h2>Stored Verification Forms (<span id="formCount">0</span>)</h2>
                <input type="text" class="search-box" id="searchBox" placeholder="Search by insurance, group name, or number...">
            </div>

            <div class="forms-grid" id="formsGrid">
                <div class="empty-state">
                    <div class="empty-state-icon">📁</div>
                    <div class="empty-state-text">No forms uploaded yet</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Storage management
        let uploadedFile = null;

        // Load stored forms from localStorage
        function loadForms() {
            const stored = localStorage.getItem('insuranceForms');
            return stored ? JSON.parse(stored) : [];
        }

        // Save forms to localStorage
        function saveForms(forms) {
            localStorage.setItem('insuranceForms', JSON.stringify(forms));
        }

        // File upload handling
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectedFile = document.getElementById('selectedFile');
        const fileName = document.getElementById('fileName');
        const removeFileBtn = document.getElementById('removeFile');
        const saveBtn = document.getElementById('saveBtn');
        const successMessage = document.getElementById('successMessage');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                handleFileSelect(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            uploadedFile = file;
            fileName.textContent = file.name;
            selectedFile.classList.add('visible');
            uploadArea.classList.add('has-file');
            checkFormValid();
        }

        removeFileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            uploadedFile = null;
            fileInput.value = '';
            selectedFile.classList.remove('visible');
            uploadArea.classList.remove('has-file');
            checkFormValid();
        });

        // Form validation
        const insuranceName = document.getElementById('insuranceName');
        const groupName = document.getElementById('groupName');
        const groupNumber = document.getElementById('groupNumber');

        [insuranceName, groupName, groupNumber].forEach(input => {
            input.addEventListener('input', checkFormValid);
        });

        function checkFormValid() {
            const isValid = uploadedFile && 
                           insuranceName.value.trim() && 
                           groupName.value.trim() && 
                           groupNumber.value.trim();
            saveBtn.disabled = !isValid;
        }

        // Save form
        saveBtn.addEventListener('click', async () => {
            if (!uploadedFile) return;

            // Convert file to base64
            const reader = new FileReader();
            reader.onload = function(e) {
                const forms = loadForms();
                
                const newForm = {
                    id: Date.now(),
                    fileName: uploadedFile.name,
                    fileData: e.target.result,
                    insuranceName: insuranceName.value.trim(),
                    groupName: groupName.value.trim(),
                    groupNumber: groupNumber.value.trim(),
                    uploadDate: new Date().toISOString()
                };

                forms.push(newForm);
                saveForms(forms);
                
                // Show success message
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 3000);

                // Reset form
                uploadedFile = null;
                fileInput.value = '';
                selectedFile.classList.remove('visible');
                uploadArea.classList.remove('has-file');
                insuranceName.value = '';
                groupName.value = '';
                groupNumber.value = '';
                saveBtn.disabled = true;

                // Refresh display
                displayForms();
            };

            reader.readAsDataURL(uploadedFile);
        });

        // Display forms
        function displayForms(searchTerm = '') {
            const forms = loadForms();
            const formsGrid = document.getElementById('formsGrid');
            const formCount = document.getElementById('formCount');

            // Filter forms based on search
            const filteredForms = forms.filter(form => {
                const search = searchTerm.toLowerCase();
                return form.insuranceName.toLowerCase().includes(search) ||
                       form.groupName.toLowerCase().includes(search) ||
                       form.groupNumber.toLowerCase().includes(search) ||
                       form.fileName.toLowerCase().includes(search);
            });

            formCount.textContent = forms.length;

            if (filteredForms.length === 0) {
                formsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <div class="empty-state-text">${searchTerm ? 'No forms found' : 'No forms uploaded yet'}</div>
                    </div>
                `;
                return;
            }

            formsGrid.innerHTML = filteredForms.map(form => {
                const uploadDate = new Date(form.uploadDate);
                const formattedDate = uploadDate.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                return `
                    <div class="form-card">
                        <div class="form-card-header">
                            <div class="pdf-icon">📄</div>
                            <div class="form-card-title">${form.insuranceName}</div>
                        </div>
                        <div class="form-card-details">
                            <div class="detail-row">
                                <span class="detail-label">Group Name:</span>
                                <span class="detail-value">${form.groupName}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Group Number:</span>
                                <span class="detail-value">${form.groupNumber}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">File:</span>
                                <span class="detail-value">${form.fileName}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Uploaded:</span>
                                <span class="detail-value">${formattedDate}</span>
                            </div>
                        </div>
                        <div class="form-card-actions">
                            <button class="download-btn" onclick="downloadForm(${form.id})">
                                ⬇️ Download PDF
                            </button>
                            <button class="delete-btn" onclick="deleteForm(${form.id})">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Search functionality
        const searchBox = document.getElementById('searchBox');
        searchBox.addEventListener('input', (e) => {
            displayForms(e.target.value);
        });

        // Download form
        function downloadForm(id) {
            const forms = loadForms();
            const form = forms.find(f => f.id === id);
            if (!form) return;

            // Create download link
            const link = document.createElement('a');
            link.href = form.fileData;
            link.download = form.fileName;
            link.click();
        }

        // Delete form
        function deleteForm(id) {
            if (!confirm('Are you sure you want to delete this form?')) return;

            const forms = loadForms();
            const updatedForms = forms.filter(f => f.id !== id);
            saveForms(updatedForms);
            displayForms(searchBox.value);
        }

        // Initial load
        displayForms();
    </script>
</body>
</html>
